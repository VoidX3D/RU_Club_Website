name: Auto-Discover Announcements

on:
  push:
    branches: [main]
    paths:
      - 'src/announcements/main/**'
      - '!src/announcements/list.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan announcement JSONs and build list.json
        run: |
          python3 << 'PYEOF'
          import json, re
          from pathlib import Path

          MAIN = Path("src/announcements/main")
          LIST_PATH = Path("src/announcements/list.json")

          existing = {}
          if LIST_PATH.exists():
              with open(LIST_PATH) as f:
                  for entry in json.load(f):
                      existing[entry["id"]] = entry

          if not MAIN.exists():
              print("No announcements/main/ directory — skipping")
              exit(0)

          announcements = []
          for file in sorted(MAIN.iterdir()):
              if not file.name.endswith(".json") or file.name.startswith(".") or file.name.startswith("_"):
                  continue
              try:
                  data = json.loads(file.read_text())
              except json.JSONDecodeError as e:
                  print(f"⚠️  Skipping {file.name}: invalid JSON ({e})")
                  continue

              slug = re.sub(r'[^a-z0-9-]', '', data.get("id", file.stem).lower().replace(' ', '-'))

              active = data.get("active")
              if not isinstance(active, bool):
                  active = existing.get(slug, {}).get("active", True)

              entry = {
                  "id": slug,
                  "title": data.get("title", file.stem.replace("-", " ").title()),
                  "tag": data.get("tag", "Notice"),
                  "date": data.get("date", ""),
                  "summary": data.get("summary", ""),
                  "image": data.get("image", ""),
                  "active": active
              }

              # Preserve extra fields (status, tags, etc.) from existing entry
              if slug in existing:
                  for k, v in existing[slug].items():
                      if k not in entry:
                          entry[k] = v

              status = "🆕" if slug not in existing else "✅"
              print(f"{status}  {slug}: {entry['title']} {'(active)' if entry['active'] else '(inactive)'}")
              announcements.append(entry)

          announcements.sort(key=lambda a: a.get("date", ""), reverse=True)
          LIST_PATH.write_text(json.dumps(announcements, indent=2, ensure_ascii=False) + "\n")
          print(f"\n✔  list.json updated — {len(announcements)} announcements")

      - name: Commit and push
        run: |
          git config user.name "Announcement Bot"
          git config user.email "bot@ruclubmss.vercel.app"
          git add src/announcements/list.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update announcement list [skip ci]"
            git push
          fi
