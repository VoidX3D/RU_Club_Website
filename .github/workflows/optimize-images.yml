# ============================================================
# Supabase Storage Image Optimizer — GitHub Actions
#
# Converts ALL storage images to WebP at original resolution (no resize)
# with quality 90 and 1-year cache headers.
# Serves WebP via render endpoint; originals available for download.
#
# Required secrets:
#   VITE_SUPABASE_URL       — Supabase project URL
#   SUPABASE_SERVICE_KEY    — Supabase service_role key
# ============================================================

name: Optimize Storage Images

permissions:
  contents: read

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install @supabase/supabase-js sharp ws

      - name: Optimize images
        run: node scripts/optimize-storage-images.mjs
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          STORAGE_BUCKET: 'ruclub'
          STORAGE_PREFIX: 'static/assets'
          STORAGE_SUBDIRS: 'members,mission,announcements,partners,gallery,brand,icons,images,hero'
          QUALITY: '85'

      - name: Upload optimizer report
        uses: actions/upload-artifact@v4
        with:
          name: optimizer-report
          path: optimizer-report.json
