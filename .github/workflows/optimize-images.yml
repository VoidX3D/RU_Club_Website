name: Optimize Images

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

concurrency:
  group: ruclub-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jpegoptim optipng libwebp-bin 2>/dev/null

      - name: Compress JPEG images
        run: |
          find src \( -name '*.jpg' -o -name '*.jpeg' \) -exec jpegoptim --strip-all --max=80 --all-progressive {} +

      - name: Compress PNG images
        run: |
          find src -name '*.png' -exec optipng -o3 -strip all {} +

      - name: Generate WebP for images
        run: |
          find src \( -name '*.jpg' -o -name '*.jpeg' -o -name '*.png' \) | while read img; do
            out="${img%.*}.webp"
            [ -f "$out" ] && continue
            cwebp -q 80 "$img" -o "$out" 2>/dev/null && echo "  WebP: $out"
          done

      - name: Commit optimized images
        run: |
          git config user.name "Image Optimizer"
          git config user.email "bot@ruclubmss.vercel.app"
          git add src/static/assets/ src/mission/*/img-*
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-optimize images [skip ci]"
            git push
          fi
