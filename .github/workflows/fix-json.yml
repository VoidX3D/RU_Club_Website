name: Fix JSON Files

on:
  push:
    branches: [main]
    paths:
      - 'src/**/*.json'
  workflow_dispatch:

concurrency:
  group: ruclub-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  fix-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate and fix all JSON files
        run: |
          python3 << 'PYEOF'
          import json
          from pathlib import Path

          fixed = 0
          for f in sorted(Path("src").rglob("*.json")):
              if ".git" in str(f):
                  continue
              raw = f.read_text()
              try:
                  data = json.loads(raw)
              except json.JSONDecodeError as e:
                  print(f"❌  Invalid JSON: {f} — {e}")
                  continue

              out = json.dumps(data, indent=2, ensure_ascii=False) + "\n"
              if out != raw:
                  f.write_text(out)
                  fixed += 1
                  print(f"✅  Fixed: {f}")

          if fixed == 0:
              print("No JSON files needed fixing")
          else:
              print(f"\n✔  Fixed {fixed} JSON file(s)")
          PYEOF

      - name: Commit fixes
        run: |
          git config user.name "JSON Fix Bot"
          git config user.email "bot@ruclubmss.vercel.app"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-fix JSON files [skip ci]"
            git push
          fi
