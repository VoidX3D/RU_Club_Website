name: Fix JSON Files

on:
  push:
    branches: [main]
    paths:
      - 'src/**/*.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  fix-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate and fix all JSON files
        run: |
          python3 << 'PYEOF'
          import json, re, sys
          from pathlib import Path

          fixed = 0
          for f in sorted(Path("src").rglob("*.json")):
              if ".git" in str(f):
                  continue
              try:
                  raw = f.read_text()
              except Exception as e:
                  print(f"⚠️  Cannot read {f}: {e}")
                  continue

              # Remove truncation artifacts
              clean = re.sub(r'\([^)]*(truncat|trimm|\.\.\.)[^)]*\)', '', raw, flags=re.I)
              clean = re.sub(r'\.{4,}\s*[^\n"]*', '', clean)

              try:
                  data = json.loads(clean)
              except json.JSONDecodeError:
                  try:
                      data = json.loads(raw)
                  except json.JSONDecodeError:
                      print(f"❌  Invalid JSON: {f}")
                      continue

              # Re-serialize to canonical format
              out = json.dumps(data, indent=2, ensure_ascii=False) + "\n"
              if out != raw:
                  f.write_text(out)
                  fixed += 1
                  print(f"✅  Fixed: {f}")

          if fixed == 0:
              print("No JSON files needed fixing")
          else:
              print(f"\n✔  Fixed {fixed} JSON file(s)")
          PYEOF

      - name: Commit and push fixes
        run: |
          git config user.name "JSON Fix Bot"
          git config user.email "bot@ruclubmss.vercel.app"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-fix JSON files [skip ci]"
            git push
          fi
