name: Fix JSON Files

on:
  push:
    branches: [main]
    paths:
      - 'src/**/*.json'
  workflow_dispatch:

concurrency:
  group: ruclub-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  fix-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate, fix, and complete all JSON files
        run: |
          python3 << 'PYEOF'
          import json
          from pathlib import Path

          fixed = 0

          REQUIRED_MISSION_FIELDS = {
              "id": "",
              "title": "Untitled Mission",
              "slug": "",
              "tag": "Mission",
              "date": "",
              "description": "",
              "detail": "",
              "images": [],
              "stats": {},
              "partners": [],
              "show": True
          }

          REQUIRED_INFO_FIELDS = {
              "stats": {},
              "hero": {},
              "intro": {},
              "features": {},
              "cta": {},
              "mission": {}
          }

          REQUIRED_PARTNER_FIELDS = {
              "src": "",
              "alt": "",
              "name": ""
          }

          REQUIRED_MEMBER_GROUPS = ["teachers", "core", "general", "stats"]

          for f in sorted(Path("src").rglob("*.json")):
              if ".git" in str(f):
                  continue
              raw = f.read_text()
              try:
                  data = json.loads(raw)
              except json.JSONDecodeError as e:
                  print(f"❌  Invalid JSON: {f} — {e}")
                  continue

              rel = f.relative_to("src")

              # --- Mission info.json completeness ---
              if f.parent.name.startswith("mission-") and f.name == "info.json":
                  changed = False
                  for key, default in REQUIRED_MISSION_FIELDS.items():
                      if key not in data:
                          data[key] = default
                          print(f"➕  Added missing '{key}' in {rel}")
                          changed = True
                  if data.get("slug") and not data.get("id"):
                      data["id"] = data["slug"]
                      print(f"➕  Added missing 'id' from 'slug' in {rel}")
                      changed = True
                  if data.get("id") and not data.get("slug"):
                      data["slug"] = data["id"]
                      print(f"➕  Added missing 'slug' from 'id' in {rel}")
                      changed = True
                  if changed:
                      fixed += 1

              # --- info/*.json completeness ---
              if f.parent.name == "info" and f.name == "content.json":
                  changed = False
                  for key, default in REQUIRED_INFO_FIELDS.items():
                      if key not in data:
                          data[key] = default
                          print(f"➕  Added missing '{key}' in {rel}")
                          changed = True
                  if changed:
                      fixed += 1

              if f.parent.name == "info" and f.name == "partners.json":
                  changed = False
                  for i, partner in enumerate(data):
                      if not isinstance(partner, dict):
                          continue
                      for key, default in REQUIRED_PARTNER_FIELDS.items():
                          if key not in partner:
                              partner[key] = default
                              print(f"➕  Added missing '{key}' in {rel}[{i}]")
                              changed = True
                  if changed:
                      fixed += 1

              if f.parent.name == "info" and f.name == "members.json":
                  changed = False
                  for group in REQUIRED_MEMBER_GROUPS:
                      if group not in data:
                          data[group] = [] if group != "stats" else {}
                          print(f"➕  Added missing '{group}' in {rel}")
                          changed = True
                  if changed:
                      fixed += 1

              # --- Format fix ---
              out = json.dumps(data, indent=2, ensure_ascii=False) + "\n"
              if out != raw:
                  f.write_text(out)
                  fixed += 1
                  print(f"✅  Fixed: {rel}")

          if fixed == 0:
              print("All JSON files are valid and complete")
          else:
              print(f"\n✔  Fixed/completed {fixed} JSON file(s)")
          PYEOF

      - name: Commit fixes
        run: |
          git config user.name "JSON Fix Bot"
          git config user.email "bot@ruclubmss.vercel.app"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-fix JSON files [skip ci]"
            git push
          fi
