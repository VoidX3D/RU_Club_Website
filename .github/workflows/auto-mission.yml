name: Auto-Discover Missions

on:
  push:
    branches: [main]
    paths:
      - 'src/mission/**'
      - '!src/mission/list.json'
  workflow_dispatch:

concurrency:
  group: ruclub-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan mission folders and build list.json
        run: |
          python3 << 'PYEOF'
          import json
          from pathlib import Path

          MISSION = Path("src/mission")
          LIST_PATH = MISSION / "list.json"

          existing = {}
          if LIST_PATH.exists():
              with open(LIST_PATH) as f:
                  for m in json.load(f).get("missions", []):
                      existing[m["slug"]] = m

          IMG_EXTS = ("*.jpg", "*.jpeg", "*.png", "*.webp")

          missions = []
          for folder in sorted(MISSION.iterdir()):
              if not folder.is_dir() or folder.name.startswith("."):
                  continue

              info_file = folder / "info.json"
              if not info_file.exists():
                  images = []
                  for ext in IMG_EXTS:
                      images.extend(folder.glob(ext))
                  if not images:
                      print(f"⚠️  Skipping {folder.name}: no info.json and no images")
                      continue
                  info = {
                      "title": folder.name.replace("-", " ").title(),
                      "description": f"Mission in {folder.name.replace('-', ' ')}",
                      "tag": "Mission",
                      "date": "",
                      "show": True
                  }
                  info_file.write_text(json.dumps(info, indent=2, ensure_ascii=False) + "\n")
                  print(f"📝  Created info.json for {folder.name}")
              else:
                  info = json.loads(info_file.read_text())

              slug = (info.get("slug") or folder.name).lower().replace(" ", "-")
              slug = "".join(c for c in slug if c.isalnum() or c == "-")

              image_count = 0
              for ext in IMG_EXTS:
                  image_count += len(list(folder.glob(ext)))

              show = info.get("show")
              if not isinstance(show, bool):
                  show = existing.get(slug, {}).get("show", True)

              mission = {
                  "slug": slug,
                  "id": slug,
                  "title": info.get("title", folder.name.replace("-", " ").title()),
                  "description": info.get("description", ""),
                  "tag": info.get("tag", ""),
                  "date": info.get("date", ""),
                  "show": show,
                  "imageCount": image_count
              }

              if image_count > 0:
                  for ext in IMG_EXTS:
                      matches = sorted(folder.glob(ext))
                      if matches:
                          mission["featured"] = f"/mission/{slug}/{matches[0].name}"
                          break

              if slug in existing:
                  for k, v in existing[slug].items():
                      if k not in mission:
                          mission[k] = v

              print(f"{'🆕' if slug not in existing else '✅'}  {slug}: {mission['title']} ({image_count} images)")
              missions.append(mission)

          missions.sort(key=lambda m: m.get("date", ""), reverse=True)
          LIST_PATH.write_text(json.dumps({"missions": missions}, indent=2, ensure_ascii=False) + "\n")
          print(f"\n✔  list.json updated — {len(missions)} missions")

      - name: Commit and push
        run: |
          git config user.name "Mission Bot"
          git config user.email "bot@ruclubmss.vercel.app"
          git add src/mission/list.json src/mission/*/info.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update mission list [skip ci]"
            git push
          fi
